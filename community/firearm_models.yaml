version: 2
# manufacturer_key, default_caliber_key, default_action_type_key reference
# community_key values from community/manufacturers.yaml (slugify-derived) and
# community/firearm_action_types.yaml (explicit). default_caliber_key may be
# omitted for models that don't have an obvious default caliber.
#
# `default_barrel_length_in` (added v0.3.0) is the standard production barrel
# length per manufacturer spec sheets. Threaded variants are not seeded as
# separate entries — users override `barrel_length_in` on their firearm. Where
# a model has multiple variants and no clear "standard" the field is omitted.
