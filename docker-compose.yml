services:
  backend:
    image: ghcr.io/crzykidd/ammoledger-backend:latest
    volumes:
      - ammoledger_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/ammoledger.db
      - CONFIG_PATH=/data/config.yaml
      - DEFAULTS_PATH=/data/defaults.yaml
      - BACKUP_PATH=/data/backups
      - UPLOADS_PATH=/data/uploads
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    image: ghcr.io/crzykidd/ammoledger-frontend:latest
    ports:
      - "5173:5173"
    environment:
      - AL_BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ammoledger_data:
    driver: local
