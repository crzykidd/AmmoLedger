services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # live reload your Python code
      - ./data:/data            # persist SQLite database
    environment:
      - DATABASE_URL=sqlite:////data/ammoledger.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app         # live reload your React code
      - /app/node_modules       # keep node_modules inside container
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
