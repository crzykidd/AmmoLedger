name: "AmmoLedger CodeQL Config"

# Use the standard security-extended suite as a baseline so we don't
# accidentally weaken the default checks. Our custom queries pack
# extends — never replaces — this baseline.
queries:
  - uses: security-extended
  - uses: ./.github/codeql/custom-queries

# Files / paths that are analyzed for issues.
# Frontend TS is analyzed via the javascript-typescript matrix entry
# which does not use this config file, so frontend/ is not in scope here.
paths:
  - backend/

paths-ignore:
  - backend/migrations/
  - backend/tests/
  - "**/__pycache__/**"
