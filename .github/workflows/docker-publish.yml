name: Build and publish Docker images

# Trigger matrix:
#   push → main          builds :dev and :sha-<short> (development, may not be stable)
#   release published    builds :latest, :<semver>, :<major> (production-ready)
#   pull_request → main  build only — no push (catches Dockerfile errors before merge)

on:
  push:
    branches: [main]
  release:
    types: [published]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "exec(open('backend/version.py').read()); print(__version__)")
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Set image name
        id: image_name
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Compute tags — backend
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-backend
          flavor: latest=false
          tags: |
            # Push to main — development build
            type=raw,value=dev,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name == 'push' }}
            # Release published — stable build
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'release' }}
            # Pull request — build-only label (never pushed)
            type=ref,event=pr
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.value }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./Dockerfile.backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.value }}

  cleanup:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name != 'pull_request'
    permissions:
      packages: write

    steps:
      - name: Delete old backend versions
        uses: actions/delete-package-versions@v5
        with:
          owner: crzykidd
          package-name: ammoledger-backend
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: false
          ignore-versions: "^(latest|dev|\\d+\\.\\d+\\.\\d+)$"

      - name: Delete old frontend versions
        uses: actions/delete-package-versions@v5
        with:
          owner: crzykidd
          package-name: ammoledger-frontend
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: false
          ignore-versions: "^(latest|dev|\\d+\\.\\d+\\.\\d+)$"

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "exec(open('backend/version.py').read()); print(__version__)")
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Set image name
        id: image_name
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Compute tags — frontend
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-frontend
          flavor: latest=false
          tags: |
            # Push to main — development build
            type=raw,value=dev,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name == 'push' }}
            # Release published — stable build
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'release' }}
            # Pull request — build-only label (never pushed)
            type=ref,event=pr
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.value }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./Dockerfile.frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.value }}

