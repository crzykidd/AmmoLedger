  - "Defense"
  - "Target / Range"
  - "Competition"
  - "Training"
  - "Plinking"

ammo_conditions:
  - "Factory New"
  - "Remanufactured"
  - "Reloaded / Handload"
  - "Military Surplus"
  - "Old"
  - "Unknown"

firearm_conditions:
  - "New"
  - "Used"
  - "Like New"
  - "LNIB"
  - "Refurbished"
