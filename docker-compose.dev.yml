services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app          # live reload your Python code
      - ./community:/app/community  # live reload community YAML files
      - ./data:/data            # persist SQLite database, config, backups, uploads
    environment:
      - DATABASE_URL=sqlite:////data/ammoledger.db
      - SESSION_SECRET=${SESSION_SECRET:-change-me}
      - CONFIG_PATH=/data/config.yaml
      - DEFAULTS_PATH=/data/defaults.yaml
      - BACKUP_PATH=/data/backups
      - UPLOADS_PATH=/data/uploads
      - APP_ENV=development
      - LOG_LEVEL=DEBUG
      - PYTHONUNBUFFERED=1
      # Dev installs pull community YAMLs from the dev branch on GitHub instead
      # of main, so newly-added lookups / manufacturers / firearm_models become
      # visible to a `:dev` install before they ship to main. Override with
      # `AL_COMMUNITY_BRANCH=somebranch` to test against a feature branch.
      - GIT_BRANCH=dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app         # live reload your React code
      - /app/node_modules       # keep node_modules inside container
    environment:
      - AL_BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
