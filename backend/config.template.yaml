# AmmoLedger Configuration Template
# Copy this file to /data/config.yaml and edit before first startup.
# WARNING: This file may contain secrets. It is git-ignored — never commit it.
#
# Environment variable overrides
# ─────────────────────────────────────────────────────────────────────────────
# Any setting below can be overridden by an AL_* environment variable set in
# your docker-compose.yml. ENV values always take priority over this file.
# If AL_SESSION_SECRET is set, config.yaml is not required at all.
#
# Key ENV variables:
#   AL_SESSION_SECRET     — security.session_secret  (required if no config.yaml)
#   AL_RESET_TOKEN        — security.reset_token
#   AL_APP_NAME           — app.name
#   AL_BASE_URL           — app.base_url
#   AL_BACKUP_ENABLED     — backup.enabled
#   AL_BACKUP_SCHEDULE    — backup.schedule
#   AL_BACKUP_RETENTION_DAYS — backup.retention_days
#   AL_BACKUP_PATH        — backup.path
# ─────────────────────────────────────────────────────────────────────────────

app:
  # Runtime environment — controls how validation errors are handled.
  # "development" logs errors as warnings and continues.
  # "production" exits immediately on any config error.
  env: "development"  # development | production

  # Application display name shown in the UI.
  # Override with AL_APP_NAME env var.
  name: "AmmoLedger"

  # How long a login session stays active before the user must re-authenticate.
  session_timeout_hours: 8  # 1-720

  # Base URL used to build QR code links on printed labels (v2.0).
  # Change to your external URL if accessing from other devices.
  # Override with AL_BASE_URL env var.
  base_url: "http://localhost:5173"

  # Check GitHub releases for available updates on startup and every 24 hours.
  check_for_updates: true

security:
  # Secret key used to sign session cookies. MUST be changed before production use.
  # Generate a strong value with: openssl rand -hex 32
  # Or on Windows: python -c "import secrets; print(secrets.token_hex(32))"
  # Override with AL_SESSION_SECRET env var (recommended for container deployments).
  session_secret: "change-this-to-a-random-string"

  # Emergency admin self-recovery: set a strong random value here, visit
  # /reset?token=<value> to reset your admin password, then clear this field.
  # Only works for admin accounts. Generate a value with: openssl rand -hex 32
  # Override with AL_RESET_TOKEN env var.
  reset_token: ""

  # Registration mode controls who can create a new account.
  # invite_only  — only valid invite links allow registration (recommended)
  # open         — anyone can register without an invite (creates a Member account)
  # disabled     — no new registrations; Admin creates accounts directly
  registration: "invite_only"

  # Default lifetime for new invite links in hours.
  invite_expiry_hours: 72

  # Password requirements (enforced on create and change).
  password_min_length: 12          # minimum characters (8-128)
  password_require_uppercase: true
  password_require_number: true
  password_require_special: true

  # Number of previous passwords to block reuse (0 = disabled).
  password_history_count: 5

  # Invalidate all existing sessions when a user changes their password.
  invalidate_sessions_on_pw_change: true

defaults:
  # Always run the seed sync on startup, even if the version already matches.
  # Set to false to skip sync when the stored version equals the YAML version.
  sync_on_startup: true
  # When true, rename yaml-sourced entries if the YAML spelling changes.
  update_existing: false
  # When true, deactivate yaml-sourced entries that were removed from the YAML.
  allow_removal: false

import:
  # Auto-backup always runs before import when true (recommended).
  require_backup: true
  # Warn in the UI if the most recent backup is older than N hours.
  backup_warning_hours: 24
  # Block import if the last backup is older than N hours (only when require_backup is false).
  backup_block_hours: 168

backup:
  # Override with AL_BACKUP_ENABLED env var.
  enabled: true
  # Time of day for the nightly backup (24-hour HH:MM, server local time).
  # Override with AL_BACKUP_SCHEDULE env var.
  schedule: "03:00"
  # Number of days to retain backup files before pruning. 1-365.
  # Override with AL_BACKUP_RETENTION_DAYS env var.
  retention_days: 30
  # Override with AL_BACKUP_PATH env var.
  path: /data/backups
  # When true, scheduled and manual backups bundle the SQLite database
  # together with the firearm photos directory in a single .zip archive
  # (default for v0.3.0+ — keeps photo data tied to the database that
  # references it). When false, backups are bare .db files and photos are
  # not included. Existing zip backups remain restorable either way.
  # Override with AL_BACKUP_INCLUDE_PHOTOS env var.
  include_photos: true

smtp:
  # Set enabled to true to activate email features (v2.0 — scheduled reports).
  # Leave host empty or enabled false to disable all email features.
  enabled: false
  host: ""
  port: 587
  username: ""
  password: ""
  from_address: ""

# Image search — for the Products "Find Image" feature
image_search:
  enabled: false            # Must be true AND api_key set for the feature to surface
  provider: brave           # Currently only "brave" is implemented
  api_key: ""               # Get one at https://api.search.brave.com (free tier: 2k queries/month)
  results_per_page: 10      # Number of thumbnails per page (max 100; default 10 — fits nicely in a 5×2 grid)
  safe_search: strict       # strict | moderate | off — passed through to Brave

notifications:
  discord:
    # Set enabled to true and supply a webhook URL to post alerts to Discord.
    enabled: false
    webhook_url: ""
    # Which notification types trigger Discord messages.
    notify_on: ["low_stock", "backup_failure", "update_available"]
  email:
    # Which notification types trigger email (requires smtp.enabled: true).
    notify_on: ["backup_failure"]
  low_stock:
    # Alert when a caliber's total qty_remaining drops below this threshold.
    default_threshold: 50
    # Per-caliber overrides. Example:
    #   per_caliber_thresholds:
    #     "9mm Luger": 200
    #     ".22 LR": 500
    per_caliber_thresholds: {}
